schema_version: 1
canon_status: LOCKED CANON
default_window_id: medium
migration_notes:
  - LOCKED CANON: fleet governance extends teacher trend governance without changing the historical/live split.
  - LOCKED CANON: fleets remain traceable to expert capsules, teacher pairs, and threshold versions.
governance_windows:
  short:
    window_id: short
    canon_status: LOCKED CANON
    description: short horizon operator window for recent validation pressure
    lookback_runs: 6
    minimum_sample_count: 3
    maximum_age_days: 7
  medium:
    window_id: medium
    canon_status: LOCKED CANON
    description: primary governance window for promotion and takeover review
    lookback_runs: 12
    minimum_sample_count: 5
    maximum_age_days: 21
  long:
    window_id: long
    canon_status: LOCKED CANON
    description: longer horizon window for replacement confidence and regression review
    lookback_runs: 24
    minimum_sample_count: 8
    maximum_age_days: 60
fleets:
  local_reasoning_fleet:
    canon_status: LOCKED CANON
    description: local-first reasoning and judgment workloads across strategic and analytic expert capsules
    subjects: [strategist, analyst, researcher, critique, meta-reasoner]
    benchmark_families:
      - task decomposition
      - objective trees
      - dependency planning
      - evidence weighting
      - diagnosis
      - benchmark-grade evaluation
      - multi-source synthesis
      - contradiction handling
      - adversarial judging
      - promotion gate review
      - self-reflection
      - policy-aware reasoning
    budget_classes: [STANDARD, DEEP, LONG_CONTEXT]
    output_forms: [STRUCTURED_PLAN, LONGFORM, EVAL_JUDGE]
    risk_tiers: [medium, high]
    localities: [local_first, mixed_local_then_remote]
    hardware_classes: [desktop_gpu, mobile_flagship, cpu_safe]
    lineage: [live-derived, dream-derived, blended-derived]
    threshold_set_id: teacher-v2026-r1
  coding_agent_fleet:
    canon_status: LOCKED CANON
    description: tool-using coding and build execution workloads across coder, toolsmith, builder, and security capsules
