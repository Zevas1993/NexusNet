schema_version: 1
registry_layer: historical
canon_status: LOCKED CANON
migration_notes:
  - Historical teacher canon is preserved as a separate registry layer and is not overwritten by the live v2026 layer.
  - Historical routing preserves best-ensemble-per-role and does not collapse into pair-only operational routing.
historical_principles:
