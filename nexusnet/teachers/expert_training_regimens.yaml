schema_version: 1
canon_status: LOCKED CANON
migration_notes:
  - Every expert capsule training path includes teacher-guided distillation, dual-teacher contrast, skeptical examination, and Dream / Self-Evolution.
  - Teacher retirement stays shadow-only until surpass evidence, external evaluation, rollback readiness, and governance sign-off exist.
stage_definitions:
  stage_1_domain_professor_distillation:
    label: "Stage 1: Domain Professor Distillation"
    teacher_scope: primary_teacher_only
    objectives: [establish field instincts, collect clean domain traces]
  stage_2_dual_teacher_contrast:
    label: "Stage 2: Dual-Teacher Contrast"
    teacher_scope: primary_and_secondary
    objectives: [primary + secondary on same task families, capture disagreement traces, store arbitration-needed cases]
  stage_3_skeptical_examination:
    label: "Stage 3: Skeptical Examination"
    teacher_scope: critique_arbiter
    objectives: [Critique Expert arbitrates]
    merge_decisions: [SELECT_BEST, PATCH_DOMAIN_WITH_LFM2_EDITS_THEN_VERIFY, DUAL_PASS_TOOL_THEN_FINAL]
  stage_4_dream_self_evolution:
    label: "Stage 4: Dream / Self-Evolution"
    teacher_scope: dream_and_external_evaluation
    objectives: [dream scenarios, adversarial edge cases, consequence feedback, external evaluation before promotion, teacher retirement only after surpass evidence and rollback readiness]
expert_regimens:
  "Coder Expert": {subject: coder, canon_status: LOCKED CANON, stages: [stage_1_domain_professor_distillation, stage_2_dual_teacher_contrast, stage_3_skeptical_examination, stage_4_dream_self_evolution], benchmark_families: [repo navigation, multi-file patching, tests green after edits, terminal recovery, codebase-scale context use]}
